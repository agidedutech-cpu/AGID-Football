<header class="header">
    <h2 id="match-title"></h2>
</header>

<div class="team-info">
    <iframe id="match-header"
        loading="lazy"
        scrolling="no"
        style="width:100%;height:250px;border:none;">
    </iframe>
</div>

<div class="tabs">

    <button
        id="MATCH_BROADCAST-tab"
        class="tab active">
        MATCH BROADCAST
    </button>

    <button
        id="LINE_UP-tab"
        class="tab">
        LINE UP
    </button>

    <button
        id="MATCH_EVENTS-tab"
        class="tab">
        MATCH EVENTS
    </button>

</div>

<div
id="MATCH_BROADCAST"
class="tab-content active">

<div id="button-container"></div>

<div id="tv-container">

<iframe
id="tv-iframe"
allowfullscreen>
</iframe>

</div>

</div>

<div
id="LINE_UP"
class="tab-content">

<iframe
id="lineup-iframe">
</iframe>

</div>

<div
id="MATCH_EVENTS"
class="tab-content">

<iframe
id="events-iframe">
</iframe>

</div>
