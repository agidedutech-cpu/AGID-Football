<div class="agid-wrapper">

    <!-- Premium Match Header -->
    <header class="agid-header-card">

        <div id="agid-competition-name" class="agid-competition">
            Competition
        </div>

        <div class="agid-match-row">

            <div class="agid-team">

                <img id="agid-home-logo" class="agid-logo" alt="Home Team">

                <div id="agid-home-name" class="agid-team-name">
                    Home
                </div>

            </div>

            <div class="agid-vs">

                VS

            </div>

            <div class="agid-team">

                <img id="agid-away-logo" class="agid-logo" alt="Away Team">

                <div id="agid-away-name" class="agid-team-name">
                    Away
                </div>

            </div>

        </div>

        <div id="agid-status" class="agid-status">

            Loading...

        </div>

    </header>

    <!-- ScoreBat Match Widget -->
    <section class="agid-scorebat">

        <iframe
            id="agid-match-header"
            loading="lazy"
            scrolling="no"
            frameborder="0">
        </iframe>

    </section>

    <!-- Tabs -->
    <nav class="agid-tabs">

        <button
            class="agid-tab active"
            data-tab="MATCH_BROADCAST">

            MATCH BROADCAST

        </button>

        <button
            class="agid-tab"
            data-tab="LINE_UP">

            LINE UP

        </button>

        <button
            class="agid-tab"
            data-tab="MATCH_EVENTS">

            MATCH EVENTS

        </button>

    </nav>

    <!-- Broadcast -->
    <section
        id="MATCH_BROADCAST"
        class="agid-panel active">

        <div id="agid-stream-buttons"></div>

        <div class="agid-video-wrapper">

            <iframe
                id="agid-video"
                allowfullscreen
                loading="lazy">
            </iframe>

        </div>

        <div class="agid-widget">

            <iframe
                id="agid-momentum"
                loading="lazy">
            </iframe>

        </div>

    </section>

    <!-- Line-up -->
    <section
        id="LINE_UP"
        class="agid-panel">

        <iframe
            id="agid-lineup"
            loading="lazy">
        </iframe>

    </section>

    <!-- Events -->
    <section
        id="MATCH_EVENTS"
        class="agid-panel">

        <iframe
            id="agid-events"
            loading="lazy">
        </iframe>

    </section>

    <!-- Disclaimer -->
    <section
        id="agid-disclaimer"
        class="agid-disclaimer">

        <strong>Disclaimer</strong>

        We are not affiliated with any stream owners. All rights belong to their respective owners.

    </section>

    <!-- Footer -->
    <footer class="agid-footer">

        Powered by

        <strong id="agid-footer">

            AGID Football

        </strong>

    </footer>

</div>
